<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MRH GROUP — Executive Dashboard</title>
<style>
  :root{--navy:#0a2342;--teal:#0f7173;--ink:#0f172a;--muted:#475569;--line:#e2e8f0;--bg:#ffffff;--amber:#b45309}
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  header{background:var(--navy);color:#fff;position:sticky;top:0;z-index:10}
 .wrap{max-width:1160px;margin:0 auto;padding:24px}
 .head{display:flex;align-items:center;justify-content:space-between;gap:16px}
 .brand{display:flex;align-items:center;gap:12px;font-weight:800;letter-spacing:.4px}
 .brand-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--teal),#14919b);display:grid;place-items:center;font-weight:900}
 .week{text-align:right}.week-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;opacity:.8}
 .week-value{font-size:1.6rem;font-weight:700;line-height:1.1;margin-top:2px}
 .status{margin-top:6px;font-size:.78rem;color:#b9e1e2;display:flex;align-items:center;justify-content:flex-end;gap:6px}
 .dot{width:8px;height:8px;border-radius:50%;background:#22d3ee;animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,211,238,.6)}70%{box-shadow:0 0 0 8px rgba(34,211,238,0)}100%{box-shadow:0 0 0 0 rgba(34,211,238,0)}}
  main{padding:28px 24px 48px}
 .grid{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:repeat(12,1fr);gap:18px}
 .card{grid-column:span 12;background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 1px 2px rgba(10,35,66,.04);transition:.18s}
 .card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(10,35,66,.08)}
 .title{color:var(--navy);font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
 .value{font-size:2.1rem;font-weight:800;margin:10px 0}
 .pill{display:inline-flex;align-items:center;gap:6px;background:var(--teal);color:#fff;font-weight:700;font-size:.82rem;padding:6px 12px;border-radius:999px;margin-bottom:10px}
 .pill.warning{background:var(--amber)}.pill.neutral{background:#64748b}
 .note{color:var(--muted);font-size:.96rem;line-height:1.45}
  @media(min-width:720px){.card{grid-column:span 6}}
  @media(min-width:1024px){.card{grid-column:span 4}.card:nth-child(4),.card:nth-child(5){grid-column:span 6}}
  footer{max-width:1160px;margin:0 auto;padding:0 24px 40px;color:#64748b;font-size:.8rem}
</style>
</head>
<body>
<header><div class="wrap head">
  <div class="brand"><div class="brand-mark">M</div><span>MRH GROUP</span></div>
  <div class="week"><div class="week-label">Executive Week</div><div class="week-value" id="week">—</div><div class="status"><span class="dot"></span><span id="status">updating…</span></div></div>
</div></header>

<main><div class="grid">
  <article class="card"><div class="title">Finance</div><div class="value" id="finance-value">—</div><div class="pill" id="finance-change">—</div><div class="note" id="finance-note">—</div></article>
  <article class="card"><div class="title">Commercial</div><div class="value" id="commercial-value">—</div><div class="pill" id="commercial-change">—</div><div class="note" id="commercial-note">—</div></article>
  <article class="card"><div class="title">Legal & Compliance</div><div class="value" id="legal-value">—</div><div class="pill" id="legal-change">—</div><div class="note" id="legal-note">—</div></article>
  <article class="card"><div class="title">Operations</div><div class="value" id="operations-value">—</div><div class="pill" id="operations-change">—</div><div class="note" id="operations-note">—</div></article>
  <article class="card"><div class="title">Office of CEO</div><div class="value" id="ceo-value">—</div><div class="pill" id="ceo-change">—</div><div class="note" id="ceo-note">—</div></article>
</div></main>

<footer><div>Source:./data/weekly.txt • Update this one file weekly</div></footer>

<script>
const DEFAULT=`WEEK=19 JUNE 2026
FINANCE=TZS 1.17M|+143.8%|Sales up, audit nearing completion
COMMERCIAL=TZS 15.0M pipeline|+1 new|3 proposals in negotiation
LEGAL=Audit 75%|On track|Tax clearance pending
OPERATIONS=4/6 projects|67% on track|Odoo at 60%
CEO=2 decisions|Urgent|Licence renewal & hire`;

function parse(t){const o={};t.split(/\r?\n/).forEach(l=>{if(!l||l.startsWith('#'))return;const i=l.indexOf('=');if(i<0)return;const k=l.slice(0,i).trim().toUpperCase();const p=l.slice(i+1).split('|');o[k]={value:p[0]?.trim()||'',change:p[1]?.trim()||'',note:p[2]?.trim()||''}});return o}
function set(id,v,c,n){document.getElementById(id+'-value').textContent=v;const p=document.getElementById(id+'-change');p.textContent=c;p.className='pill '+(c.includes('Urgent')||c.includes('Risk')?'warning':c.includes('+')||c.includes('track')?'':'neutral');document.getElementById(id+'-note').textContent=n}
async function load(){try{const r=await fetch('./data/weekly.txt?t='+Date.now(),{cache:'no-store'});if(!r.ok)throw'';const d=parse(await r.text());document.getElementById('week').textContent=d.WEEK?.value||'—';set('finance',d.FINANCE.value,d.FINANCE.change,d.FINANCE.note);set('commercial',d.COMMERCIAL.value,d.COMMERCIAL.change,d.COMMERCIAL.note);set('legal',d.LEGAL.value,d.LEGAL.change,d.LEGAL.note);set('operations',d.OPERATIONS.value,d.OPERATIONS.change,d.OPERATIONS.note);set('ceo',d.CEO.value,d.CEO.change,d.CEO.note);document.getElementById('status').textContent='live'}catch(e){const d=parse(DEFAULT);document.getElementById('week').textContent=d.WEEK.value;set('finance',d.FINANCE.value,d.FINANCE.change,d.FINANCE.note);set('commercial',d.COMMERCIAL.value,d.COMMERCIAL.change,d.COMMERCIAL.note);set('legal',d.LEGAL.value,d.LEGAL.change,d.LEGAL.note);set('operations',d.OPERATIONS.value,d.OPERATIONS.change,d.OPERATIONS.note);set('ceo',d.CEO.value,d.CEO.change,d.CEO.note);document.getElementById('status').textContent='offline • showing default'}}
document.addEventListener('DOMContentLoaded',load);
</script>
</body>
</html>
